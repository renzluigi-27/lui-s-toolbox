<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>India Bank Checker</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #f5f4f0; --surface: #ffffff; --surface2: #f1efe8;
  --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.25);
  --text: #1a1a18; --text-muted: #5f5e5a; --text-hint: #888780;
  --green-bg: #EAF3DE; --green-text: #3B6D11; --green-dot: #639922;
  --red-bg: #FCEBEB; --red-text: #A32D2D; --red-dot: #E24B4A;
  --radius-md: 8px; --radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a; --surface: #252523; --surface2: #2c2c2a;
    --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
    --text: #f0ede6; --text-muted: #b4b2a9; --text-hint: #888780;
    --green-bg: #173404; --green-text: #C0DD97; --green-dot: #97C459;
    --red-bg: #501313; --red-text: #F7C1C1; --red-dot: #F09595;
  }
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1rem 2rem;
}

/* Back link */
.back-link {
  align-self: flex-start;
  font-size: 13px;
  color: var(--text-hint);
  text-decoration: none;
  margin-bottom: 2rem;
}
.back-link:hover { color: var(--text-muted); }

header {
  text-align: center;
  margin-bottom: 2.5rem;
}
header h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
header p {
  font-size: 14px;
  color: var(--text-muted);
}

.container {
  width: 100%;
  max-width: 660px;
}

/* Section label */
.section-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-hint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 0.75rem;
}

/* Card */
.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
  margin-bottom: 0.75rem;
}

/* Inputs */
label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-hint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 6px;
  display: block;
}

input {
  width: 100%;
  height: 40px;
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 0 12px;
  font-size: 14px;
  background: var(--surface2);
  font-family: var(--font-mono);
  margin-bottom: 12px;
}

/* Button */
button {
  width: 100%;
  height: 42px;
  font-size: 14px;
  font-weight: 500;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
}
button:hover { opacity: 0.85; }

/* Result bar */
.result-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 11px;
  font-weight: 500;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 8px;
}

/* Status dot */
.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
}

/* Result box */
.result-box {
  display: none;
}
.result-box.valid {
  background: var(--green-bg);
  color: var(--green-text);
}
.result-box.invalid {
  background: var(--red-bg);
  color: var(--red-text);
}
.result-box pre {
  font-family: var(--font-mono);
  white-space: pre-wrap;
}

/* Footer */
footer {
  margin-top: 2rem;
  text-align: center;
  font-size: 10px;
  color: var(--text-hint);
  line-height: 1.8;
}
</style>
</head>
<body>

<a class="back-link" href="index.html">← Back</a>

<header>
  <h1>India Bank Checker</h1>
  <p>Validate IFSC and bank branch details</p>
</header>

<div class="container">

  <div class="section-label">Bank Details</div>

  <div class="card">
    <label>Account Number</label>
    <input type="text" id="account" placeholder="Enter account number">

    <label>IFSC Code</label>
    <input type="text" id="ifsc" placeholder="Enter IFSC (e.g. HDFC0001234)">

    <button onclick="checkBank()">Validate Bank Details</button>
  </div>

  <div class="section-label">Result</div>

  <div id="resultCard" class="card result-box">
    <div class="result-bar">
      <div id="statusDot" class="status-dot"></div>
      <div id="statusText">Status</div>
    </div>
    <pre id="resultText"></pre>
  </div>

</div>

<footer>
  Toolbox by Renz Luigi<br>
  India Bank Validation Tool
</footer>

<script src="india-banks.js"></script>
<script src="india-checker.js"></script>

</body>
</html>
