<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>India Bank Checker — Lui's Toolbox</title>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f5f4f0;
  --surface: #ffffff;
  --surface2: #f1efe8;
  --border: rgba(0,0,0,0.12);
  --border-strong: rgba(0,0,0,0.25);
  --text: #1a1a18;
  --text-muted: #5f5e5a;
  --text-hint: #888780;
  --green-bg: #EAF3DE;
  --green-text: #3B6D11;
  --green-dot: #639922;
  --red-bg: #FCEBEB;
  --red-text: #A32D2D;
  --red-dot: #E24B4A;
  --radius-md: 8px;
  --radius-lg: 12px;
  --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --font-mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
}

@media (prefers-color-scheme: dark) {
  :root {
    --bg: #1c1c1a;
    --surface: #252523;
    --surface2: #2c2c2a;
    --border: rgba(255,255,255,0.1);
    --border-strong: rgba(255,255,255,0.22);
    --text: #f0ede6;
    --text-muted: #b4b2a9;
    --text-hint: #888780;
    --green-bg: #173404;
    --green-text: #C0DD97;
    --green-dot: #97C459;
    --red-bg: #501313;
    --red-text: #F7C1C1;
    --red-dot: #F09595;
  }
}

body {
  font-family: var(--font-sans);
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 3rem 1rem 4rem;
}

header {
  text-align: center;
  margin-bottom: 2.5rem;
  width: 100%;
  max-width: 660px;
}
header h1 {
  font-size: 26px;
  font-weight: 600;
  letter-spacing: -0.02em;
  margin-bottom: 6px;
}
header p {
  font-size: 14px;
  color: var(--text-muted);
}

.container {
  width: 100%;
  max-width: 900px;
}

.back-link {
  font-size: 13px;
  color: var(--text-hint);
  text-decoration: none;
  display: inline-block;
  margin-bottom: 10px;
}
.back-link:hover { color: var(--text-muted); }

.card {
  background: var(--surface);
  border: 0.5px solid var(--border);
  border-radius: var(--radius-lg);
  padding: 1.5rem;
}

.input-row {
  display: flex;
  gap: 8px;
  margin-bottom: 0.5rem;
}

input {
  flex: 1;
  font-family: var(--font-mono);
  font-size: 15px;
  background: var(--surface2);
  border: 0.5px solid var(--border-strong);
  border-radius: var(--radius-md);
  padding: 0 14px;
  height: 44px;
  color: var(--text);
  outline: none;
  transition: border-color 0.15s;
}

input:focus {
  border-color: #378ADD;
  box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
}

input::placeholder {
  color: var(--text-hint);
  font-size: 13px;
}

button {
  padding: 0 20px;
  height: 44px;
  font-size: 14px;
  font-weight: 500;
  font-family: var(--font-sans);
  white-space: nowrap;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: var(--radius-md);
  cursor: pointer;
  transition: opacity 0.15s, transform 0.1s;
}
button:hover { opacity: 0.85; }
button:active { transform: scale(0.97); }

.hint {
  font-size: 12px;
  color: var(--text-hint);
  margin-top: 6px;
}

#result {
  display: none;
  margin-top: 1.5rem;
}

.status-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 1rem;
  padding-bottom: 1rem;
  border-bottom: 0.5px solid var(--border);
  flex-wrap: wrap;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 500;
  padding: 4px 12px;
  border-radius: var(--radius-md);
  flex-shrink: 0;
}
.badge-valid { background: var(--green-bg); color: var(--green-text); }
.badge-invalid { background: var(--red-bg); color: var(--red-text); }
.badge-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
.badge-valid .badge-dot { background: var(--green-dot); }
.badge-invalid .badge-dot { background: var(--red-dot); }

.ifsc-formatted {
  font-family: var(--font-mono);
  font-size: 15px;
  font-weight: 500;
  letter-spacing: 0.06em;
  word-break: break-all;
}

.error-msg {
  font-size: 13px;
  color: var(--red-text);
  background: var(--red-bg);
  padding: 8px 12px;
  border-radius: var(--radius-md);
  margin-bottom: 0.75rem;
  display: none;
}

.fields {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.field {
  background: var(--surface2);
  border-radius: var(--radius-md);
  padding: 0.75rem 1rem;
}
.field.full {
  grid-column: 1 / -1;
}
.field-label {
  font-size: 11px;
  font-weight: 500;
  color: var(--text-hint);
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-bottom: 4px;
}
.field-value {
  font-size: 14px;
  color: var(--text);
  font-weight: 500;
  line-height: 1.4;
}
.field-value.mono {
  font-family: var(--font-mono);
}

footer {
  margin-top: 3rem;
  text-align: center;
  font-size: 12px;
  color: var(--text-hint);
  line-height: 1.8;
}

@media (max-width: 480px) {
  .fields { grid-template-columns: 1fr; }
  .field.full { grid-column: 1; }
  header h1 { font-size: 20px; }
}
</style>
</head>
<body>

<header>
  <h1>India Bank Checker</h1>
  <p>Validate IFSC and bank account details — runs entirely in your browser, no data sent anywhere</p>
</header>

<div class="container">

  <a class="back-link" href="index.html">&#8592; Back to Tools</a>

  <div class="card">
    <div class="input-row">
      <input type="text" id="accountInput" placeholder="Account Number">
      <input type="text" id="ifscInput" placeholder="IFSC Code">
      <button onclick="checkBank()">Validate</button>
    </div>
    <div class="hint">Press Enter or click Validate · IFSC format: ABCD0123456</div>

    <div id="result">
      <div class="status-row">
        <span id="statusBadge" class="badge"></span>
        <span id="ifscFormatted" class="ifsc-formatted"></span>
      </div>
      <div id="errorMsg" class="error-msg"></div>
      <div id="detailFields" class="fields"></div>
    </div>
  </div>

</div>

<footer>
  All tools run entirely in your browser &nbsp;&middot;&nbsp; No data is uploaded or stored &nbsp;&middot;&nbsp; Renz Luigi v1.6.4 &copy; 2026
</footer>

<script src="india-banks.js"></script>
<script src="india-checker.js"></script>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', function(e) {
  if (e.key === "F12") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && e.key === "J") e.preventDefault();
  if (e.ctrlKey && e.key === "u") e.preventDefault();
  if (e.ctrlKey && e.key === "s") e.preventDefault();
  if (e.ctrlKey && e.shiftKey && e.key === "C") e.preventDefault();
});
</script>

</body>
</html>
