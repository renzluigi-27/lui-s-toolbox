<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Client Data Entry</title>
  <link rel="stylesheet" href="/assets/css/global.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #f5f4f0; --surface: #ffffff; --surface2: #f1efe8;
      --border: rgba(0,0,0,0.12); --border-strong: rgba(0,0,0,0.25);
      --text: #1a1a18; --text-muted: #5f5e5a; --text-hint: #888780;
      --green-bg: #EAF3DE; --green-text: #3B6D11; --red-bg: #FCEBEB; --red-text: #A32D2D;
      --radius-md: 8px; --radius-lg: 12px;
      --font-sans: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'SFMono-Regular', 'Consolas', 'Liberation Mono', monospace;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1c1a; --surface: #252523; --surface2: #2c2c2a;
        --border: rgba(255,255,255,0.1); --border-strong: rgba(255,255,255,0.22);
        --text: #f0ede6; --text-muted: #b4b2a9; --text-hint: #888780;
        --green-bg: #173404; --green-text: #C0DD97; --red-bg: #501313; --red-text: #F7C1C1;
      }
    }

    body {
      font-family: var(--font-sans);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.5rem 1rem 2rem;
      justify-content: flex-start;
    }
    header { text-align: center; margin-bottom: 0.6rem; width: 100%; max-width: 1400px; }
    header h1 { font-size: 26px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 6px; }
    header p { font-size: 14px; color: var(--text-muted); }
    .container { width: 100%; max-width: 900px; }

    .back-link {
      align-self: flex-start;
      font-size: 13px;
      color: var(--text-hint);
      text-decoration: none;
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      gap: 5px;
      transition: color 0.15s;
    }
    .back-link:hover { color: var(--text-muted); }

    .card {
      background: var(--surface);
      border: 0.5px solid var(--border);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1rem;
    }
    .section-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-bottom: 0.75rem;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 3fr 1fr;
      gap: 8px;
    }
    @media (max-width: 1024px) {
   .form-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 640px) {
   .form-grid { grid-template-columns: 1fr; }
    }

    .field { display: flex; flex-direction: column; gap: 3px; }
    .field label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-hint);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .field input, .field select {
      width: 100%;
      background: var(--surface2);
      border: 0.5px solid var(--border-strong);
      border-radius: var(--radius-md);
      color: var(--text);
      font-family: var(--font-sans);
      font-size: 13px;
      padding: 6px 8px;
      outline: none;
    }
    .field input:focus, .field select:focus {
      border-color: #378ADD;
      box-shadow: 0 0 0 3px rgba(55,138,221,0.15);
    }

    .field input[type="date"] {
      color-scheme: dark;
      cursor: pointer;
    }

    .run-btn {
      width: 100%;
      height: 44px;
      margin-top: 1.2rem;
      border: none;
      border-radius: var(--radius-md);
      background: var(--text);
      color: var(--bg);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
    }
    .run-btn:hover { opacity: 0.85; }
    .run-btn:active { transform: scale(0.97); }

    #status {
      margin-top: 0.75rem;
      font-size: 13px;
      border-radius: var(--radius-md);
      padding: 8px 10px;
      display: none;
    }
    #status.success { display: block; background: var(--green-bg); color: var(--green-text); }
    #status.error { display: block; background: var(--red-bg); color: var(--red-text); }

    footer { margin-top: 2rem; text-align: center; font-size: 13px; color: var(--text-hint); line-height: 1.8; }
    @media (max-width: 480px) { header h1 { font-size: 20px; } }
    @media (min-width: 1200px) { header h1 { font-size: 30px; } .card { padding: 1rem; } }
  </style>
</head>
<body>
  <div class="page-container">
    <div class="content">
  <header>
    <h1>Client Data Entry</h1>
    <p>Submit client records to Google Sheets</p>
  </header>

  <div class="container">
    <a class="back-link" href="index.html">&#8592; Back to Tools</a>
    <div class="card">
      <div class="section-label">Form</div>
      <form id="clientForm">
        <div class="form-grid">
          <div class="field"><label for="quantity">Quantity</label><input id="quantity" type="number" name="Quantity" min="1" value="1" required /></div>
          <div class="field"><label for="contractNo">Contract No</label><input id="contractNo" type="text" name="Contract No" required /></div>
          <div class="field"><label for="clientName">Client name</label><input id="clientName" type="text" name="Client name" required /></div>
          <div class="field"><label for="Company">Company</label><input id="Company" type="text" name="Company" required /></div>
          <div class="field"><label for="totalCost">Total cost</label><input id="totalCost" type="text" name="Total cost" required /></div>
          <div class="field"><label for="containerType">Container type</label><input id="containerType" type="text" name="Container type" required /></div>
          <div class="field"><label for="modeOfPayment">Mode of Payment</label><input id="modeOfPayment" type="text" name="Mode of Payment" required /></div>
          <div class="field"><label for="paymentReceivedDate">Payment received date</label><input id="paymentReceivedDate" type="date" name="Payment received date" required /></div>
          <div class="field"><label for="returnAmount">Return amount</label><input id="returnAmount" type="text" name="Return amount" required /></div>
          <div class="field"><label for="payoutFrequency">Payout frequency</label><input id="payoutFrequency" type="text" name="Payout frequency" required /></div>
          <div class="field"><label for="accountNo">Account no</label><input id="accountNo" type="text" name="Account no" required /></div>
          <div class="field"><label for="IBAN">IBAN</label><input id="IBAN" type="text" name="IBAN" required /></div>
          <div class="field"><label for="swiftCode">Swift Code</label><input id="swiftCode" type="text" name="Swift Code" required /></div>
          <div class="field"><label for="bankName">Bank Name</label><input id="bankName" type="text" name="Bank Name" required /></div>
          <div class="field"><label for="Address">Address</label><input id="Address" type="text" name="Address" required /></div>
          <div class="field"><label for="receivingCurrency">Receiving Currency</label><input id="receivingCurrency" type="text" name="Receiving Currency" required /></div>
          <div class="field"><label for="clientTypes">Client types</label><select id="clientTypes" name="Client types" required><option value="">Select</option><option value="Local">Local</option><option value="International">International</option></select></div>
          <div class="field"><label for="numbersOfTrips">Numbers of trips</label><input id="numbersOfTrips" type="text" name="Numbers of trips" required /></div>
          <div class="field"><label for="agentClosing">Agent Closing</label><input id="agentClosing" type="text" name="Agent Closing" required /></div>
        </div>
        <button class="run-btn" type="submit">Submit</button>
      </form>
      <p id="status"></p>
    </div>
  </div>
<script>
const PASSWORD = "0904"; // change this

const userPass = prompt("Enter password:");

if (userPass !== PASSWORD) {
  document.body.innerHTML = "<h3 style='font-family:sans-serif;text-align:center;margin-top:50px;'>Access Denied</h3>";
}
</script>

  
  <script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyQVXGFYy3aD8eR2ClRR6D6CD6NoWwLN2NX6xIAxnnpC0qQbvf0Yz3tYlv4kaIY9l-UHA/exec";

    document.getElementById("clientForm").addEventListener("submit", async function (e) {
      e.preventDefault();
      const status = document.getElementById("status");
      status.className = "";
      status.textContent = "Submitting...";
      status.style.display = "block";

      const formData = new FormData(this);
      const payload = {};
      formData.forEach((value, key) => {
        payload[key] = value;
      });

      try {
        const response = await fetch("WEB_APP_URL", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(payload)
        });

        const result = await response.json();
        if (result.success) {
          status.className = "success";
          status.textContent = "Submitted successfully.";
          this.reset();
        } else {
          status.className = "error";
          status.textContent = "Submission failed.";
        }
      } catch (error) {
        status.className = "error";
        status.textContent = "Error submitting form.";
      }
    });
  </script>

<script>
document.addEventListener('contextmenu', e => e.preventDefault());

document.addEventListener('keydown', function(e) {
  // F12
  if (e.key === "F12") e.preventDefault();

  // Ctrl+Shift+I
  if (e.ctrlKey && e.shiftKey && e.key === "I") e.preventDefault();

  // Ctrl+Shift+J
  if (e.ctrlKey && e.shiftKey && e.key === "J") e.preventDefault();

  // Ctrl+U (view source)
  if (e.ctrlKey && e.key === "u") e.preventDefault();

  // Ctrl+S (save page)
  if (e.ctrlKey && e.key === "s") e.preventDefault();

  // Ctrl+Shift+C (inspect element)
  if (e.ctrlKey && e.shiftKey && e.key === "C") e.preventDefault();
});
</script>
  
    </div>
    <div id="footer"></div>
  </div>

  <script>
  fetch('/components/footer.html')
    .then(res => res.text())
    .then(data => {
      document.getElementById('footer').innerHTML = data;
    });
  </script>
</body>
</html>
